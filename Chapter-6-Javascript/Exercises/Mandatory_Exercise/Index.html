<!DOCTYPE html> <!-- Declares the document type as HTML5 -->
<html lang="en"> <!-- Sets the language of the document to English -->

<head>
  <meta charset="UTF-8" /> <!-- Sets character encoding to UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <!-- Makes layout responsive on all devices -->
  <title>Eco Drive Challenge</title> <!-- Title shown on the browser tab -->
  <link rel="icon" href="https://firsthub.in/public/uploads/all/dpqZwzUe7FtH8L4T70eoHCdLKihKBsTpXNY5K010.webp" type="image/png"> <!-- Favicon (icon on browser tab) -->
  <link rel="stylesheet" href="style.css" /> <!-- Links the external CSS file -->
</head>

<body>
  <main class="calculator-container"> <!-- Main container for the calculator -->

    <h1>Eco Drive Challenge</h1> <!-- Heading of the page -->

    <div class="form-group"> <!-- Group for petrol price input -->
      <label for="price">Petrol Price (per liter):</label> <!-- Label for price input -->
      <input type="number" id="price" value="1.72" step="0.01" /> <!-- Input field with default price and decimal step -->
    </div>

    <div class="form-group"> <!-- Group for liters purchased input -->
      <label for="liters">Liters Purchased:</label> <!-- Label for liters input -->
      <input type="number" id="liters" value="0" /> <!-- Input with default value of 0 -->
    </div>

    <div class="form-group"> <!-- Group for distance input -->
      <label for="distance">Trip Distance (km):</label> <!-- Label for trip distance -->
      <input type="number" id="distance" placeholder="Enter distance..." /> <!-- Input with placeholder text -->
    </div>

    <button id="calculateBtn">Calculate</button> <!-- Button to trigger calculation -->

    <div id="results"> <!-- Section to display calculation results -->
      <p id="costOutput">Total Cost: £0.00</p> <!-- Shows the total cost of petrol -->
      <p id="efficiencyOutput">Efficiency: -- km/l</p> <!-- Shows fuel efficiency -->
      <p id="emissionsOutput">CO₂ Emissions: -- kg</p> <!-- Shows estimated CO2 emissions -->
      <p id="scoreOutput">Eco Score: -- / 100</p> <!-- Displays eco-friendliness score -->
      <p id="badgeOutput">Badges: --</p> <!-- Displays badges earned (gamified) -->
      <p id="tipOutput">Tip: --</p> <!-- Shows a driving tip based on result -->
    </div>

  </main>

  <script src="index.js"></script> <!-- Links to external JavaScript file -->
</body>
</html>
