<!DOCTYPE html> 
<html lang="en"> <!-- Set language to English -->
<head>
    <meta charset="UTF-8"> <!-- Ensure correct character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Make page responsive -->
    <title>Embedded Video</title> <!-- Page title in browser tab -->
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLfnJHBet8NwgKlIP2m2qTJKCnGFh5I9FUqA&s" type="image/png"> <!-- Favicon (icon on browser tab) -->
    <link rel="stylesheet" href="style.css" type="text/css" /> <!-- Link external CSS -->
</head>
<body>

<div class="content"> <!-- Wrapper for the text and video -->
        <h1>Sunset Over Cappadocia</h1> <!-- Main heading of the page -->
        <p>Experience the breathtaking view of hot air balloons rising over the ancient landscape of Cappadocia, Turkey.</p> <!-- Short description of the video -->

    <div class="video-container"> <!-- Container to center the video -->
        <video controls loop poster="Video-Poster/image.jpg"> <!-- Video element with controls, looping, and poster -->
            <source src="Video-Poster/video.mp4" type="video/mp4"> <!-- Video file source -->
            Your browser does not support the video tag. <!-- Fallback text -->
        </video>
    </div> 
</div>


</body>
</html>
