<!DOCTYPE html> <!-- Declares the document as an HTML5 file -->
<html lang="en"> <!-- Root element of the HTML document, with language set to English -->
<head> <!-- Metadata and resources for the document -->
  
  <meta charset="UTF-8" /> <!-- Sets character encoding to UTF-8 for wide character support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <!-- Ensures responsive scaling on all screen sizes -->
  <title>Alan Partridge Soundboard</title> <!-- Sets the page title in the browser tab -->
  <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQi53cDG2jc-Z5omFLkK_l77fbXuGWoSY2dbQ&s" type="image/png"> <!-- Favicon (icon on browser tab) -->
  <link rel="stylesheet" href="style.css"> <!-- Links to the external CSS stylesheet for styling -->
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&display=swap" rel="stylesheet"> <!-- Imports custom Google Fonts: Monoton and Orbitron -->
</head>

<body>
  <!-- Visible content of the web page -->

  <header>
    <!-- Top section containing the main heading -->
    <h1>Alan Partridge Soundboard</h1>
    <!-- Displays the title of the soundboard -->
  </header>

  <main>
    <!-- Main content area of the page -->

    <section class="soundboard">
      <!-- A grid section that holds all the sound cards -->

      <!-- Individual sound card containing a title and audio -->
      <article class="sound-card">
        <h2>Ah-Ha</h2>
        <p class="duration">2 sec</p>
        <audio src="Audio/ah-ha.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>Back of the net</h2>
        <p class="duration">3 sec</p>
        <audio src="Audio/back-of-the-net.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>Bang out of order</h2>
        <p class="duration">4 sec</p>
        <audio src="Audio/bangoutoforder.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>Dan</h2>
        <p class="duration">2 sec</p>
        <audio src="Audio/dan.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>Email of the evening</h2>
        <p class="duration">3 sec</p>
        <audio src="Audio/emailoftheevening.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>Hello Partridge</h2>
        <p class="duration">2 sec</p>
        <audio src="Audio/hellopartridge.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>I ate a scotch egg</h2>
        <p class="duration">5 sec</p>
        <audio src="Audio/iateascotchegg.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>Im Confused</h2>
        <p class="duration">4 sec</p>
        <audio src="Audio/imconfused.mp3"></audio>
      </article>

      <article class="sound-card">
        <h2>Jurassic Park</h2>
        <p class="duration">4 sec</p>
        <audio src="Audio/jurassic-park.mp3"></audio>
      </article>
    </section>
  </main>

  <script src="index.js"></script>
  <!-- Loads external JavaScript to handle interactivity -->
</body>
</html>
